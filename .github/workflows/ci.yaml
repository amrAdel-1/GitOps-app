name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GH_PAT }}" | docker login ghcr.io \
            -u ${{ github.actor }} --password-stdin

      - name: Build & Push Docker image
        run: |
          docker build -t ghcr.io/amradel-1/gitops-app:${{ github.sha }} .
          docker push ghcr.io/amradel-1/gitops-app:${{ github.sha }}

      - name: Update image tag in gitops-config
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ secrets.GITOPS_CONFIG_REPO }} gitops-config
          cd gitops-config

          sed -i "s|image: ghcr.io/amradel-1/gitops-app:.*|image: ghcr.io/amradel-1/gitops-app:${{ github.sha }}|" \
            apps/base/deployment.yaml

          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "chore: update image tag to ${{ github.sha }}"
          git push